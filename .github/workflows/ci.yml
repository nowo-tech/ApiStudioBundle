# CI: tests on PHP × Symfony 7.0, 7.4, 8.0, 8.1 (minimum: PHP 8.2, Symfony 7).
# Release (incl. latest) is created by release.yml on tag push (v*).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  git-hygiene:
    name: Git history (no Cursor co-author)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Cursor co-author trailers (REQ-GIT-001)
        run: |
          chmod +x .scripts/check-no-cursor-coauthor.sh
          ./.scripts/check-no-cursor-coauthor.sh HEAD

  test:
    name: PHP ${{ matrix.php }} - Symfony ${{ matrix.symfony }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        symfony: ['7.0', '7.4', '8.0', '8.1']
        exclude:
          # Symfony 8 requires PHP >= 8.4
          - php: '8.2'
            symfony: '8.0'
          - php: '8.2'
            symfony: '8.1'
          - php: '8.3'
            symfony: '8.0'
          - php: '8.3'
            symfony: '8.1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          coverage: pcov
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-symfony-${{ matrix.symfony }}-composer-
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies with Symfony ${{ matrix.symfony }}
        run: |
          composer require --no-interaction --no-update \
            symfony/asset:^${{ matrix.symfony }} \
            symfony/config:^${{ matrix.symfony }} \
            symfony/dependency-injection:^${{ matrix.symfony }} \
            symfony/form:^${{ matrix.symfony }} \
            symfony/framework-bundle:^${{ matrix.symfony }} \
            symfony/http-client:^${{ matrix.symfony }} \
            symfony/http-kernel:^${{ matrix.symfony }} \
            symfony/routing:^${{ matrix.symfony }} \
            symfony/security-bundle:^${{ matrix.symfony }} \
            symfony/security-csrf:^${{ matrix.symfony }} \
            symfony/translation:^${{ matrix.symfony }} \
            symfony/twig-bundle:^${{ matrix.symfony }} \
            symfony/validator:^${{ matrix.symfony }} \
            symfony/yaml:^${{ matrix.symfony }}
          # keep browser-kit in require-dev (do not move it to require)
          composer require --dev --no-interaction --no-update \
            symfony/browser-kit:^${{ matrix.symfony }}
          # full -W update so doctrine/* can move to ^3 on Symfony 8
          composer update --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: composer test

      - name: Run tests with coverage (PHP 8.2 + Symfony 7.0 only)
        if: matrix.php == '8.2' && matrix.symfony == '7.0'
        run: composer test-coverage

  cs-check:
    name: Code Style Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check code style
        run: composer cs-check
